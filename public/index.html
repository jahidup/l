<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL PROTOCOL - User Panel</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #050814; color: #E5F0FF; margin: 0; padding: 20px; }
        .login-container, .app-container { max-width: 800px; margin: 50px auto; background: rgba(15,23,42,0.95); border-radius: 16px; padding: 30px; border: 1px solid rgba(148,163,184,0.4); }
        h1 { text-align: center; color: #00E1FF; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #334155; background: #020617; color: white; }
        button { background: linear-gradient(135deg, #00E1FF, #00FFC6); color: #020617; font-weight: bold; cursor: pointer; }
        .error { color: #FB7185; font-size: 14px; }
        .credit-badge { background: #22C55E20; padding: 8px 16px; border-radius: 40px; display: inline-block; margin-bottom: 20px; }
        .result { background: #020617; padding: 15px; border-radius: 12px; white-space: pre-wrap; font-family: monospace; font-size: 12px; margin-top: 20px; max-height: 400px; overflow: auto; }
        .admin-link { text-align: center; margin-top: 20px; }
        a { color: #00E1FF; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div id="loginDiv" class="login-container">
    <h1>🔐 NULL PROTOCOL - User Login</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="loginError" class="error"></div>
    <div class="admin-link">Admin? <a href="/admin.html">Go to Admin Panel (4-field login)</a></div>
</div>

<div id="appDiv" class="app-container" style="display:none;">
    <div class="nav">
        <div class="credit-badge">💰 Credits: <span id="credits">0</span></div>
        <button id="logoutBtn" style="width: auto; padding: 6px 12px;">Logout</button>
    </div>
    <h1>🔍 Search</h1>
    <select id="apiType">
        <option value="phone">📱 Phone Lookup</option>
        <option value="aadhaar">🆔 Aadhaar Lookup</option>
        <option value="ration">🍚 Ration Card</option>
        <option value="vehicle">🚗 Vehicle RC</option>
        <option value="vehicle_chalan">📜 Vehicle Challan</option>
        <option value="vehicle_pro">🏍️ Vehicle Pro</option>
        <option value="ifsc">🏦 IFSC Lookup</option>
        <option value="email">📧 Email Lookup</option>
        <option value="pincode">📍 Pincode Lookup</option>
        <option value="gst">📄 GST Lookup</option>
        <option value="tg_to_num">📱 Telegram to Number</option>
        <option value="ip_info">🌐 IP Info</option>
        <option value="ff_info">🎮 Free Fire Info</option>
        <option value="ff_ban">🚫 Free Fire Ban</option>
        <option value="tg_info_pro">📡 Telegram Info Pro</option>
        <option value="tg_info">📡 Telegram Info</option>
        <option value="insta_info">📷 Instagram Info</option>
        <option value="github_info">🐙 GitHub Info</option>
    </select>
    <input type="text" id="query" placeholder="Enter search value (e.g., 9876543210)">
    <button id="searchBtn">🔎 Search (1 credit)</button>
    <div id="searchResult" class="result">Waiting for search...</div>
</div>

<script>
    let token = null;
    const loginDiv = document.getElementById('loginDiv');
    const appDiv = document.getElementById('appDiv');
    const creditsSpan = document.getElementById('credits');
    const loginBtn = document.getElementById('loginBtn');
    const searchBtn = document.getElementById('searchBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const apiType = document.getElementById('apiType');
    const queryInput = document.getElementById('query');
    const resultDiv = document.getElementById('searchResult');

    loginBtn.onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
            document.getElementById('loginError').innerText = 'Enter username and password';
            return;
        }
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            token = data.token;
            localStorage.setItem('userToken', token);
            creditsSpan.innerText = data.credits;
            loginDiv.style.display = 'none';
            appDiv.style.display = 'block';
            document.getElementById('loginError').innerText = '';
        } else {
            document.getElementById('loginError').innerText = data.error;
        }
    };

    searchBtn.onclick = async () => {
        if (!token) return;
        const query = queryInput.value.trim();
        if (!query) {
            resultDiv.innerHTML = '⚠️ Please enter a search value';
            return;
        }
        resultDiv.innerHTML = '⏳ Searching... (1 credit will be deducted)';
        try {
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ apiType: apiType.value, query })
            });
            const data = await res.json();
            if (res.ok) {
                creditsSpan.innerText = data.credits_left;
                resultDiv.innerHTML = JSON.stringify(data.data, null, 2);
            } else {
                resultDiv.innerHTML = `❌ Error: ${data.error}`;
                if (data.error === 'Insufficient credits') {
                    setTimeout(() => { window.location.reload(); }, 2000);
                }
            }
        } catch (err) {
            resultDiv.innerHTML = `❌ Network error: ${err.message}`;
        }
    };

    logoutBtn.onclick = () => {
        localStorage.removeItem('userToken');
        location.reload();
    };

    // Auto-login if token exists
    const savedToken = localStorage.getItem('userToken');
    if (savedToken) {
        token = savedToken;
        fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json())
            .then(data => {
                if (data.credits !== undefined) {
                    creditsSpan.innerText = data.credits;
                    loginDiv.style.display = 'none';
                    appDiv.style.display = 'block';
                } else {
                    localStorage.removeItem('userToken');
                }
            })
            .catch(() => localStorage.removeItem('userToken'));
    }

    queryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
    document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
</script>
</body>
</html>
