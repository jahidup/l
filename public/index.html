<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NULL PROTOCOL | Premium Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, rgba(5, 8, 20, 1) 0%, #0a0f1f 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #f0f3fa;
      min-height: 100vh;
      padding: 1.5rem;
      /* ensures zoom works cleanly */
      zoom: 0.8;
      -moz-transform: scale(0.8);
      -moz-transform-origin: top left;
    }

    /* responsive container */
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* glassmorphic card */
    .card {
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 225, 255, 0.3);
      padding: 2rem;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
      transition: all 0.2s ease;
    }

    /* header */
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00e1ff, #00ffc6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .badge {
      background: rgba(34, 197, 94, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      border-left: 3px solid #22c55e;
    }

    /* inputs & selects */
    input, select, button {
      width: 100%;
      padding: 0.9rem 1.2rem;
      margin: 0.6rem 0;
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid #2d3a5e;
      border-radius: 1.5rem;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #00e1ff;
      box-shadow: 0 0 8px rgba(0,225,255,0.3);
    }
    button {
      background: linear-gradient(95deg, #00e1ff, #00ffc6);
      color: #020617;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1.05rem;
    }
    button:hover {
      transform: scale(1.01);
      filter: brightness(1.05);
    }

    /* result panel */
    .result-box {
      background: #010314;
      border-radius: 1.5rem;
      padding: 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      overflow-x: auto;
      white-space: pre-wrap;
      border: 1px solid #2d3a5e;
      max-height: 500px;
    }

    /* animations */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate {
      animation: fadeSlide 0.4s ease;
    }

    /* responsive grid */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; zoom: 0.7; }
      .card { padding: 1.2rem; }
      .logo { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOGIN CARD -->
  <div id="loginCard" class="card" style="max-width: 500px; margin: 10vh auto;">
    <div class="logo" style="text-align: center; margin-bottom: 1rem;">⚡ NULL PROTOCOL</div>
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Sign in</h2>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="doLoginBtn">Access Intelligence →</button>
    <div id="loginError" style="color: #fb7185; margin-top: 1rem; text-align: center;"></div>
    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="/admin.html" style="color: #00e1ff; text-decoration: none;">🔐 Admin (4‑field)</a>
    </div>
  </div>

  <!-- DASHBOARD CARD (hidden initially) -->
  <div id="dashboard" style="display: none;">
    <div class="flex-between" style="margin-bottom: 1.5rem;">
      <div class="logo">⚡ NULL PROTOCOL</div>
      <div class="badge">💰 <span id="creditsDisplay">0</span> credits</div>
      <button id="logoutBtn" style="width: auto; padding: 0.5rem 1.2rem;">Logout</button>
    </div>
    <div class="card">
      <h2>🔍 Deep Search</h2>
      <select id="apiSelect">
        <option>Loading APIs...</option>
      </select>
      <input type="text" id="searchQuery" placeholder="Enter phone, Aadhaar, vehicle, etc...">
      <button id="searchNowBtn">🔎 Execute (1 credit)</button>
      <div id="searchResult" class="result-box" style="margin-top: 1.5rem;">✨ Ready for search</div>
    </div>
  </div>
</div>

<script>
  let authToken = localStorage.getItem('userToken');
  const loginDiv = document.getElementById('loginCard');
  const dashboard = document.getElementById('dashboard');
  const creditsSpan = document.getElementById('creditsDisplay');

  async function loadApiTypes() {
    try {
      const res = await fetch('/api/api-types', { headers: { 'Authorization': `Bearer ${authToken}` } });
      const data = await res.json();
      const select = document.getElementById('apiSelect');
      select.innerHTML = '';
      if (data.length === 0) {
        select.innerHTML = '<option>No APIs available</option>';
      } else {
        data.forEach(api => {
          const opt = document.createElement('option');
          opt.value = api.type;
          opt.textContent = api.type.toUpperCase() + ' — ' + (api.description || '');
          select.appendChild(opt);
        });
      }
    } catch(e) { console.error(e); }
  }

  async function updateCredits() {
    const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${authToken}` } });
    const data = await res.json();
    if (data.credits !== undefined) creditsSpan.innerText = data.credits;
    else if (data.error === 'Invalid token') logout();
  }

  function logout() {
    localStorage.removeItem('userToken');
    window.location.reload();
  }

  document.getElementById('doLoginBtn').onclick = async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) return document.getElementById('loginError').innerText = 'Both fields required';
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      authToken = data.token;
      localStorage.setItem('userToken', authToken);
      loginDiv.style.display = 'none';
      dashboard.style.display = 'block';
      await loadApiTypes();
      await updateCredits();
    } else {
      document.getElementById('loginError').innerText = data.error;
    }
  };

  document.getElementById('searchNowBtn').onclick = async () => {
    const apiType = document.getElementById('apiSelect').value;
    const query = document.getElementById('searchQuery').value.trim();
    if (!query) return alert('Enter search value');
    const resultDiv = document.getElementById('searchResult');
    resultDiv.innerHTML = '⏳ Processing request... (1 credit)';
    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
        body: JSON.stringify({ apiType, query })
      });
      const data = await res.json();
      if (res.ok) {
        creditsSpan.innerText = data.credits_left;
        resultDiv.innerHTML = `<pre>${JSON.stringify(data.data, null, 2)}</pre>`;
      } else {
        resultDiv.innerHTML = `❌ ${data.error}`;
        if (data.error === 'Insufficient credits') setTimeout(() => logout(), 1500);
      }
    } catch (err) {
      resultDiv.innerHTML = `⚠️ Network error: ${err.message}`;
    }
  };

  document.getElementById('logoutBtn').onclick = logout;

  // Auto login
  if (authToken) {
    fetch('/api/me', { headers: { 'Authorization': `Bearer ${authToken}` } })
      .then(res => res.json())
      .then(data => {
        if (data.credits !== undefined) {
          loginDiv.style.display = 'none';
          dashboard.style.display = 'block';
          loadApiTypes();
          creditsSpan.innerText = data.credits;
        } else {
          localStorage.removeItem('userToken');
        }
      }).catch(() => localStorage.removeItem('userToken'));
  }
</script>
</body>
</html>
