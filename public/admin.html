<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - NULL PROTOCOL</title>
    <style>
        body { background: #050814; color: #E5F0FF; font-family: monospace; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #0F172A; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: left; }
        button { background: #00E1FF; color: #000; border: none; padding: 5px 10px; margin: 2px; cursor: pointer; border-radius: 6px; }
        input, select { background: #020617; color: white; border: 1px solid #334155; padding: 6px; margin: 4px; }
        .form-card { background: #0F172A; padding: 20px; margin-bottom: 20px; border-radius: 12px; }
    </style>
</head>
<body>
<h1>👑 Admin Panel - User Management</h1>
<div class="form-card">
    <h3>➕ Add New User</h3>
    <input type="text" id="newUser" placeholder="Username">
    <input type="password" id="newPass" placeholder="Password">
    <input type="number" id="newCredits" placeholder="Credits" value="10">
    <label><input type="checkbox" id="newBlocked"> Blocked</label>
    <label><input type="checkbox" id="newAdmin"> Admin</label>
    <button id="addUserBtn">Add User</button>
</div>

<div class="form-card">
    <h3>📋 All Users</h3>
    <table id="userTable">
        <thead><tr><th>ID</th><th>Username</th><th>Credits</th><th>Blocked</th><th>Admin</th><th>Actions</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let adminToken = localStorage.getItem('adminToken');
    if (!adminToken) {
        const login = prompt('Admin Login - Enter your admin username and password (format: username:password)');
        if (login) {
            const [username, password] = login.split(':');
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(res => res.json()).then(data => {
                if (data.token && data.is_admin) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    loadUsers();
                } else alert('Invalid admin credentials');
            });
        }
    } else {
        loadUsers();
    }

    async function loadUsers() {
        const res = await fetch('/admin/users', { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const users = await res.json();
        const tbody = document.querySelector('#userTable tbody');
        tbody.innerHTML = '';
        users.forEach(u => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = u.id;
            row.insertCell(1).innerText = u.username;
            row.insertCell(2).innerHTML = `<input type="number" id="cred_${u.id}" value="${u.credits}" style="width:80px">`;
            row.insertCell(3).innerHTML = `<input type="checkbox" id="block_${u.id}" ${u.is_blocked ? 'checked' : ''}>`;
            row.insertCell(4).innerText = u.is_admin ? 'Yes' : 'No';
            row.insertCell(5).innerHTML = `<button onclick="updateUser(${u.id})">Update</button>
                                           ${!u.is_admin ? `<button onclick="deleteUser(${u.id})">Delete</button>` : ''}`;
        });
    }

    window.updateUser = async (id) => {
        const credits = document.getElementById(`cred_${id}`).value;
        const is_blocked = document.getElementById(`block_${id}`).checked;
        await fetch(`/admin/user/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify({ credits: parseInt(credits), is_blocked })
        });
        loadUsers();
    };

    window.deleteUser = async (id) => {
        if (confirm('Delete user?')) {
            await fetch(`/admin/user/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
            loadUsers();
        }
    };

    document.getElementById('addUserBtn').onclick = async () => {
        const username = document.getElementById('newUser').value;
        const password = document.getElementById('newPass').value;
        const credits = parseInt(document.getElementById('newCredits').value);
        const is_blocked = document.getElementById('newBlocked').checked;
        const is_admin = document.getElementById('newAdmin').checked;
        await fetch('/admin/user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify({ username, password, credits, is_blocked, is_admin })
        });
        loadUsers();
        document.getElementById('newUser').value = '';
        document.getElementById('newPass').value = '';
    };
</script>
</body>
</html>
